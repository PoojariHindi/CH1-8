<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hindi Quiz</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0aad4b">
<style>
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: linear-gradient(180deg, #fffdf8 0%, #f7fbf7 100%);
    color: #222;
    margin: 0;
    padding: 8px;
  }

  .quiz-box {
    background: #ffffff;
    max-width: 600px;
    margin: 0 auto;
    padding: 10px;
    border-radius: 16px;
    box-sizing: border-box;
    border: 1px solid #e8efe8;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
  }

  .app-title {
    text-align: center;
    font-size: 20px;
    margin: 2px 0 4px;
    color: #2f5d3a;
    letter-spacing: 0.3px;
  }

  .update-info {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin: 0 0 10px;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    align-items: end;
    margin-bottom: 10px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
  }

  .control-group label {
    font-size: 12px;
    margin-bottom: 4px;
    color: #555;
  }

  select,
  button {
    box-sizing: border-box;
    border-radius: 10px;
    font-size: 15px;
  }

  select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #d7e3d7;
    background: #fff;
    color: #222;
  }

  button {
    padding: 9px 10px;
    cursor: pointer;
    border: 1px solid #d9d9d9;
    background: #fff;
    color: #222;
    transition: 0.15s ease;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
  }

  button:hover {
    background: #fafaf7;
  }

  .start-btn {
    background: #dff5df;
    border: 1px solid #9bd19b;
    color: #1f5a2d;
  }

  .review-btn {
    background: #ffe6c7;
    border: 1px solid #ffbf75;
    color: #7b4b12;
  }

  .start-btn,
  .review-btn {
    white-space: nowrap;
  }

  .quiz-card {
    padding-top: 2px;
  }

  .quiz-meta-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    opacity: 0.82;
    margin: 2px 0 4px;
    flex-wrap: wrap;
  }

  .quiz-meta-row span {
    background: #f7faf7;
    border: 1px solid #e4eee4;
    padding: 2px 7px;
    border-radius: 999px;
  }

  .quiz-question {
    font-size: 32px;
    line-height: 1.22;
    text-align: center;
    margin: 6px 0 8px;
    word-break: break-word;
    font-family: "Noto Sans Devanagari", "Noto Sans JP", sans-serif;
    color: #1f1f1f;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .quiz-subhint {
    text-align: center;
    font-size: 13px;
    opacity: 0.82;
    margin: 3px 0 7px;
    line-height: 1.35;
  }

  .quiz-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .choice-btn {
    display: block;
    width: 100%;
    margin: 0;
    padding: 10px 8px;
    min-height: 52px;
    font-size: 24px;
    line-height: 1.22;
    font-family: "Noto Sans Devanagari", "Noto Sans JP", sans-serif;
    cursor: pointer;
    border-radius: 12px;
    border: 1px solid #dcdcdc;
    background: #fff;
    color: #111;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    transition: 0.15s ease;
  }

  .choice-btn:active {
    transform: scale(0.99);
  }

  .choice-btn.correct {
    border: 2px solid #2e7d32;
    background: #e8f8ea;
    transform: scale(1.01);
  }

  .choice-btn.wrong {
    border: 2px solid #c62828;
    background: #fff3f3;
  }

  .quiz-feedback {
    margin-top: 8px;
    font-weight: 600;
    text-align: center;
    font-size: 14px;
    line-height: 1.35;
    min-height: 22px;
  }


  .mylist-action-btn {
    margin-top: 8px;
    width: 100%;
    padding: 9px 10px;
    background: #eef4ff;
    border: 1px solid #b9cdf5;
    color: #23406f;
  }

  .mylist-action-btn.remove {
    background: #fff0f0;
    border: 1px solid #e4a3a3;
    color: #8a2c2c;
  }

  .mylist-btn {
  margin-top: 8px;
  width: 100%;
  padding: 10px;
  background: #e6f3ff;
  border: 1px solid #9ecbff;
  color: #1f4f7a;
}
  .quiz-action-row .mylist-btn {
  width: auto;
  flex: 1 1 0;
  min-width: 0;
  font-size: 13px;
  padding: 8px 6px;
}

  .mylist-status {
    margin-top: 6px;
    text-align: center;
    font-size: 12px;
    color: #666;
    line-height: 1.4;
  }

  .next-btn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    background: #eef7ee;
    border: 1px solid #bdd8bd;
    color: #23492b;
  }
  
  .known-btn {
  background: #f1e7ff;
  border: 1px solid #caa8ff;
  color: #5b3a8a;
}

  .known-btn.remove {
  background: #e3d2ff;
  border: 1px solid #b88cff;
  color: #4a2c73;
}

  .known-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
}

.known-remove-btn {
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
}

  @media (max-width: 640px) {
    body {
      padding: 6px;
    }

    .quiz-box {
      padding: 9px;
      border-radius: 14px;
    }

    .controls {
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 9px;
    }

    .start-btn,
    .review-btn {
      grid-column: 1 / -1;
      width: 100%;
    }

    .app-title {
      font-size: 18px;
      margin-bottom: 3px;
    }

    .update-info {
      font-size: 11px;
      margin-bottom: 8px;
    }

    .quiz-question {
      font-size: 30px;
      margin: 5px 0 7px;
    }

    .quiz-choices {
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .choice-btn {
      font-size: 24px;
      min-height: 50px;
      padding: 9px 8px;
    }

    .quiz-feedback {
      margin-top: 7px;
      font-size: 13px;
    }

  
  .mylist-action-btn {
    margin-top: 8px;
    width: 100%;
    padding: 9px 10px;
    background: #eef4ff;
    border: 1px solid #b9cdf5;
    color: #23406f;
  }

  .mylist-action-btn.remove {
    background: #fff0f0;
    border: 1px solid #e4a3a3;
    color: #8a2c2c;
  }

  .mylist-status {
    margin-top: 6px;
    text-align: center;
    font-size: 12px;
    color: #666;
    line-height: 1.4;
  }

  .quiz-action-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 10px;
  }

  .quiz-action-row button {
  font-size: 13px;
  padding: 8px 10px;
  }
  
  .next-btn {
      margin-top: 7px;
      padding: 9px;
    }
  }

  .footer-links {
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid #e8efe8;
  text-align: center;
  font-size: 12px;
  line-height: 1.7;
  opacity: 0.9;
}

.footer-links a {
  color: #2f5d3a;
  text-decoration: underline;
  text-underline-offset: 3px;
  font-weight: 700;
  transition: 0.15s ease;
}

.footer-links a:hover {
  color: #ff9933;
}

.footer-links span {
  color: #aaa;
  margin: 0 7px;
}
</style>

</head>

<body>
  <div class="quiz-box">
    <h2 class="app-title">Hindi Quiz</h2>
    <div class="update-info">2026年6月5日更新 : 2945 words</div>

    <div class="controls">
      <div class="control-group">
        <label for="modeSelect">語彙セット</label>
        <select id="modeSelect">
          <option value="mylist">マイリスト</option>
          <option value="ch">基礎語彙</option>
          <option value="news">ニュース語彙</option>
          <option value="academic_vocab">読解語彙</option>
          <option value="academic_fill">読解穴埋め</option>
          <option value="academic_expressions">読解表現</option>
          <option value="bollywood_vocab">B語彙</option>
          <option value="bollywood_fill">B穴埋め</option>
          <option value="bollywood_expressions">B表現</option>
          <option value="known">覚えたリスト</option>
        </select>
      </div>

      <div class="control-group" id="lessonWrap">
        <label for="lessonSelect" id="lessonLabel">範囲</label>
        <select id="lessonSelect">
          <option value="1-1">L1</option>
          <option value="1-2">L1-2</option>
          <option value="1-3">L1-3</option>

          <option value="1-6">L1-6</option>
          <option value="1-7">L1-7</option>
          <option value="1-8">L1-8</option>

          <option value="9-9">L9</option>
          <option value="9-10">L9-10</option>
          <option value="9-11">L9-11</option>
          <option value="9-12">L9-12</option>
          
          <option value="1-12">ALL</option>

        </select>
      </div>

      <div class="control-group">
        <label for="directionSelect" id="directionLabel">出題方向</label>
        <select id="directionSelect">
          <option value="hi2jp">ヒン→日</option>
          <option value="jp2hi">日→ヒン</option>
        </select>
      </div>

      <button id="startQuizBtn" class="start-btn">開始</button>
      <button id="reviewBtn" class="review-btn">復習</button>
    </div>

    <div id="quizArea"></div>
    <div id="footerLinks" class="footer-links">

  </a>
</div>
  </div>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register("./service-worker.js");

          registration.addEventListener("updatefound", () => {
            const newWorker = registration.installing;
            if (!newWorker) return;

            newWorker.addEventListener("statechange", () => {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                console.log("新しいバージョンが利用可能です。再読み込みしてください。");
              }
            });
          });
        } catch (error) {
          console.error("Service Worker registration failed:", error);
        }
      });
    }
  </script>
</body>
</html>
