<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Quiz </title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body {
  font-family: sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 8px;
}

.quiz-box {
  background: white;
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
  border-radius: 12px;
  box-sizing: border-box;
}

.app-title {
  text-align: center;
  font-size: 20px;
  margin: 4px 0 10px;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  align-items: end;
  margin-bottom: 12px;
}

.control-group {
  display: flex;
  flex-direction: column;
}

.control-group label {
  font-size: 12px;
  margin-bottom: 4px;
  color: #444;
}

select,
button {
  box-sizing: border-box;
  border-radius: 10px;
  font-size: 16px;
}

select {
  width: 100%;
  padding: 10px;
}

button {
  padding: 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #fff;
}

.start-btn,
.review-btn {
  white-space: nowrap;
}

.choice-btn {
  display: block;
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  font-size: 17px;
  cursor: pointer;
  border-radius: 10px;
}

.choice-btn.correct {
  border: 2px solid #2e7d32;
}

.choice-btn.wrong {
  border: 2px solid #c62828;
}

.quiz-feedback {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}

.next-btn {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
}

.quiz-meta {
  font-size: 12px;
  opacity: 0.8;
  margin: 4px 0;
  text-align: center;
}

@media (max-width: 640px) {
  .controls {
    grid-template-columns: 1fr 1fr;
  }

  .start-btn,
  .review-btn {
    grid-column: 1 / -1;
    width: 100%;
  }
}

  .app-title {
    font-size: 18px;
  }

  .quiz-question {
    font-size: 24px;
  }

  .choice-btn {
    font-size: 16px;
    padding: 11px;
  }
}
</style>
</head>

<body>


<script>
if ("serviceWork<div class="quiz-box">
  <h2 class="app-title">Hindi Quiz</h2>

  <div class="controls">
    <div class="control-group">
      <label for="modeSelect">語彙セット</label>
      <select id="modeSelect">
        <option value="ch">基礎</option>
        <option value="news">ニュース</option>
      </select>
    </div>

    <div class="control-group" id="lessonWrap">
      <label for="lessonSelect" id="lessonLabel">範囲</label>
      <select id="lessonSelect">
        <option value="1">L1</option>
        <option value="2">L1–2</option>
        <option value="3">L1–3</option>
        <option value="4">L1–4</option>
        <option value="5">L1–5</option>
        <option value="6">L1–6</option>
        <option value="7">L1–7</option>
        <option value="8">L1–8</option>
      </select>
    </div>

    <div class="control-group">
      <label for="directionSelect">出題方向</label>
      <select id="directionSelect">
        <option value="hi2jp">ヒン→日</option>
        <option value="jp2hi">日→ヒン</option>
      </select>
    </div>

    <button id="startQuizBtn" class="start-btn">開始</button>
    <button id="reviewBtn" class="review-btn">復習</button>
  </div>

  <div id="quizArea"></div>
</div>

<script src="script.js"></script>
  
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const registration = await navigator.serviceWorker.register("./service-worker.js");

      // 更新が見つかったときの監視
      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (
            newWorker.state === "installed" &&
            navigator.serviceWorker.controller
          ) {
            console.log("新しいバージョンが利用可能です。再読み込みしてください。");
          }
        });
      });
    } catch (error) {
      console.error("Service Worker registration failed:", error);
    }
  });
}
</script>

</body>

</html>
