<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒンディー語単語クイズ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body {
  font-family: sans-serif;
  background:#f2f2f2;
  padding:10px;
}

.quiz-box {
  background:white;
  max-width:600px;
  margin:auto;
  padding:15px;
  border-radius:12px;
}

.question {
  font-size:26px;
  margin:20px 0;
  text-align:center;
}

.hi-text {
  font-size:36px;
  font-weight:bold;
}

button {
  width:100%;
  padding:14px;
  margin:6px 0;
  font-size:20px;
  border-radius:10px;
}

.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }

.top-bar {
  display:flex;
  gap:5px;
}

.mode-btn {
  flex:1;
  padding:8px;
}

.choice-btn {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  cursor: pointer;
}

.choice-btn.correct {
  border: 2px solid #2e7d32;
}

.choice-btn.wrong {
  border: 2px solid #c62828;
}

.quiz-feedback {
  margin-top: 12px;
  font-weight: bold;
}

.next-btn {
  margin-top: 12px;
  padding: 10px 14px;
  cursor: pointer;
}

.quiz-meta {
  font-size: 0.9rem;
  opacity: 0.8;
}  

</style>
</head>

<body>

<div class="quiz-box">
  <h2 style="text-align:center;">ヒンディー語単語クイズ</h2>

  <label for="modeSelect">モード</label>
  <select id="modeSelect">
    <option value="ch">Complete Hindi</option>
    <option value="news">News Vocabulary</option>
  </select>

  <br><br>

  <label for="lessonSelect" id="lessonLabel">レッスン範囲</label>
  <select id="lessonSelect">
    <option value="1">Lesson 1</option>
    <option value="2">Lesson 1–2</option>
    <option value="3">Lesson 1–3</option>
    <option value="4">Lesson 1–4</option>
    <option value="5">Lesson 1–5</option>
    <option value="6">Lesson 1–6</option>
    <option value="7">Lesson 1–7</option>
    <option value="8">Lesson 1–8</option>
  </select>

  <br><br>

  <button id="startQuizBtn">クイズ開始</button>

  <hr>

  <div id="quizArea"></div>
</div>

<script src="script.js"></script>
</body>

</html>
